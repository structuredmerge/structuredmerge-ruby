name: Current

permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
      - '*-stable'
    tags:
      - '!*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Clone sibling fixtures repo
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/structuredmerge/structuredmerge-fixtures ../fixtures
      - name: Setup Ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0
        with:
          ruby-version: 4.0.2
          bundler-cache: true
      - name: Run checks
        run: bundle exec rspec
